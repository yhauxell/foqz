# Build the marketing landing (`yarn build:landing`) and deploy to GitHub Pages.
# Repo → Settings → Pages: set Source to “GitHub Actions”.
name: Deploy landing

on:
  push:
    branches: [main]

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build landing
        env:
          VITE_LANDING_GITHUB_REPO: ${{ github.repository }}
          # GitHub Project Pages live at /repo-name/ — adjust if you use a custom domain (set VITE_BASE=/).
          VITE_BASE: /${{ github.event.repository.name }}/
        run: yarn build:landing

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-landing

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
